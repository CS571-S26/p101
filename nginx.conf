server {
    listen 80;
    server_name _;

    # ── Serve the React app ──────────────────────────────────────────────────
    # The Vite build has base: '/p101/' so static files live under /p101/
    root /usr/share/nginx/html;

    location /p101/ {
        try_files $uri $uri/ /p101/index.html;
    }

    # Redirect bare root to the app
    location = / {
        return 301 /p101/;
    }

    # ── Proxy API calls to the Spring Boot backend ───────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Proxy OAuth2 redirects to the Spring Boot backend ───────────────────
    location /oauth2/ {
        proxy_pass         http://backend:8080/oauth2/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /login/oauth2/ {
        proxy_pass         http://backend:8080/login/oauth2/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
